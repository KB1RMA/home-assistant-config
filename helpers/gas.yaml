# Gas Rate Input Helpers
# These allow manual entry of gas rates from your National Grid bill
# Update these values when you receive your monthly gas bill

# Alert threshold for high usage
gas_usage_alert_threshold:
  name: "Gas Usage Alert Threshold"
  min: 0
  max: 20000
  step: 50
  unit_of_measurement: "ft³/month"
  icon: mdi:gas-cylinder
  mode: box

# Gas delivery rate per therm (sum of all delivery line items; changes quarterly)
# R-3B: Delivery Peak $0.9544 + Dist Adj EE $0.2719 + Dist Adj Other $0.2855 = $1.5118/therm
gas_delivery_rate:
  name: "Gas Delivery Rate"
  min: 0.1
  max: 5.0
  step: 0.0001
  initial: 1.5118
  unit_of_measurement: "USD/therm"
  icon: mdi:pipe-valve
  mode: box

# Gas supply rate per therm (changes monthly)
# R-3B: Gas Supply Peak $1.2329/therm
gas_supply_rate:
  name: "Gas Supply Rate"
  min: 0.1
  max: 5.0
  step: 0.0001
  initial: 1.2329
  unit_of_measurement: "USD/therm"
  icon: mdi:gas-burner
  mode: box

# Therm conversion factor (CCF → therms; shown on bill, changes each period)
gas_therm_factor:
  name: "Gas Therm Factor"
  min: 0.9
  max: 1.2
  step: 0.00001
  initial: 1.03378
  unit_of_measurement: "therms/CCF"
  icon: mdi:calculator
  mode: box

# Monthly minimum charge (fixed delivery fee on each bill)
gas_customer_charge:
  name: "Gas Minimum Charge"
  min: 0.0
  max: 50.0
  step: 0.01
  initial: 11.60
  unit_of_measurement: "USD"
  icon: mdi:cash
  mode: box

# Paperless billing credit (subtracted from total each bill)
gas_paperless_credit:
  name: "Gas Paperless Credit"
  min: 0.0
  max: 5.0
  step: 0.01
  initial: 0.38
  unit_of_measurement: "USD"
  icon: mdi:cash-minus
  mode: box

# Physical meter reading (ft³) at the start of the first tracked billing period
# Set this once to the meter value at the beginning of the month when HA started tracking.
# Used as a baseline to derive previous month consumption before the utility meter
# accumulates a full cycle. Once sensor.gas_utility.last_period is non-zero, this is ignored.
gas_meter_start_reading:
  name: "Gas Meter Start Reading"
  min: 0
  max: 9999999
  step: 1
  initial: 702608
  unit_of_measurement: "ft³"
  icon: mdi:counter
  mode: box
