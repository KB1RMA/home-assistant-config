title: Plants & Garden
views:
  - type: sections
    title: Plants
    path: plants
    icon: mdi:flower
    max_columns: 3
    sections:

      # ── Garden Status ───────────────────────────────────────────────────────
      # Planting readiness, watering needs, and weather at a glance.
      - title: Garden Status
        type: grid
        column_span: 3
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Cool-Season Flowers
            secondary: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count == 0 %}
                Waiting for 7-day average to accumulate…
              {% else %}
                {% set t = vals | max | round(1) %}
                {% if t >= 45 %}
                  ✓ Ready to plant · 7-day avg {{ t }} °F — {{ (t - 45) | round(1) }} °F above threshold
                {% else %}
                  Not yet · 7-day avg {{ t }} °F — needs {{ (45 - t) | round(1) }} °F more (target 45 °F)
                {% endif %}
              {% endif %}
            multiline_secondary: true
            icon: mdi:flower-tulip-outline
            icon_color: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count == 0 %}grey
              {% elif vals | max >= 45 %}green
              {% else %}blue{% endif %}
            badge_icon: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count > 0 and vals | max >= 45 %}mdi:check-circle
              {% else %}mdi:clock-outline{% endif %}
            badge_color: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count > 0 and vals | max >= 45 %}green{% else %}grey{% endif %}
          - type: custom:mushroom-template-card
            primary: Warm-Season Flowers
            secondary: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count == 0 %}
                Waiting for 7-day average to accumulate…
              {% else %}
                {% set t = vals | max | round(1) %}
                {% if t >= 60 %}
                  ✓ Ready to plant · 7-day avg {{ t }} °F — {{ (t - 60) | round(1) }} °F above threshold
                {% else %}
                  Not yet · 7-day avg {{ t }} °F — needs {{ (60 - t) | round(1) }} °F more (target 60 °F)
                {% endif %}
              {% endif %}
            multiline_secondary: true
            icon: mdi:weather-sunny
            icon_color: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count == 0 %}grey
              {% elif vals | max >= 60 %}orange
              {% else %}blue{% endif %}
            badge_icon: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count > 0 and vals | max >= 60 %}mdi:check-circle
              {% else %}mdi:clock-outline{% endif %}
            badge_color: >
              {% set s1 = states('sensor.backyard_flowers_soil_temp_7_day_mean') %}
              {% set s2 = states('sensor.vegetable_garden_soil_temp_7_day_mean') %}
              {% set vals = [s1, s2] | select('is_number') | map('float') | list %}
              {% if vals | count > 0 and vals | max >= 60 %}green{% else %}grey{% endif %}
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: binary_sensor.backyard_flowers_needs_watering
                icon: mdi:flower
              - type: entity
                entity: binary_sensor.vegetable_garden_needs_watering
                icon: mdi:sprout
              - type: entity
                entity: binary_sensor.money_tree_needs_watering
                icon: mdi:tree
              - type: entity
                entity: binary_sensor.office_plant_needs_watering
                icon: mdi:flower-tulip
              - type: entity
                entity: binary_sensor.top_of_fridge_plant_needs_watering
                icon: mdi:leaf
          - type: custom:stack-in-card
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.olive_st_wx_dailyrain
                name: Today's Rainfall (in)
                icon: mdi:weather-rainy
                icon_color: blue
              - type: custom:mushroom-entity-card
                entity: binary_sensor.rain_skipping_outdoor_watering
                name: Outdoor Watering Suppressed by Rain
                icon: mdi:water-check

      # ── Outdoor Plants ──────────────────────────────────────────────────────
      # Side-by-side overview charts, then one card per plant.
      - title: Outdoor Plants
        type: grid
        column_span: 3
        columns: 2
        cards:
          - type: custom:mini-graph-card
            title: Soil Temperature — 7 days (°F)
            title_sec: Blue < 45 °F · Orange 45–60 °F · Green ≥ 60 °F
            hours_to_show: 168
            lower_bound: 30
            entities:
              - entity: sensor.backyard_flowers_soil_temperature
                name: Backyard Flowers
              - entity: sensor.vegetable_garden_soil_temperature
                name: Vegetable Garden
            color_thresholds:
              - value: 30
                color: '#2196f3'
              - value: 45
                color: '#ff9800'
              - value: 60
                color: '#4caf50'
            show:
              fill: false
              points: false
              extrema: true
              labels: true
          - type: custom:mini-graph-card
            title: Soil Moisture — 48 hours (%)
            title_sec: Red < 20% (needs water) · Orange 20–40% · Green ≥ 40%
            hours_to_show: 48
            lower_bound: 0
            upper_bound: 100
            entities:
              - entity: sensor.backyard_flowers_soil_soil_moisture
                name: Backyard Flowers
              - entity: sensor.vegetable_garden_soil_soil_moisture
                name: Vegetable Garden
            color_thresholds:
              - value: 0
                color: '#f44336'
              - value: 20
                color: '#ff9800'
              - value: 40
                color: '#4caf50'
            show:
              fill: true
              points: false
              extrema: true
              labels: true
          - type: custom:stack-in-card
            cards:
              - type: custom:mushroom-template-card
                primary: Backyard Flowers
                secondary: >
                  {% set raw = states('sensor.backyard_flowers_soil_soil_moisture') %}
                  {% set traw = states('sensor.backyard_flowers_soil_temperature') %}
                  {% set t = traw | float | round(1) if traw not in ['unavailable', 'unknown'] else none %}
                  {% if raw in ['unavailable', 'unknown'] %}
                    Moisture unavailable{% if t is not none %} · {{ t }}°F{% endif %}
                  {% else %}
                    {% set m = raw | int %}
                    {% set ts = state_attr('input_datetime.backyard_flowers_last_watered', 'timestamp') %}
                    {% set temp_str = ' · ' ~ t ~ '°F' if t is not none else '' %}
                    {% if ts %}
                      {% set s = (now().timestamp() - ts) | int %}
                      {% set d = s // 86400 %}{% set h = (s % 86400) // 3600 %}
                      {{ m }}%{{ temp_str }} · watered {{ (d ~ 'd ' if d > 0 else '') ~ h ~ 'h' }} ago
                    {% else %}
                      {{ m }}% moisture{{ temp_str }}
                    {% endif %}
                  {% endif %}
                icon: mdi:flower
                icon_color: >
                  {% set raw = states('sensor.backyard_flowers_soil_soil_moisture') %}
                  {% if raw in ['unavailable', 'unknown'] %}grey
                  {% else %}
                    {% set m = raw | float %}
                    {% if m < 20 %}red{% elif m < 40 %}orange{% else %}green{% endif %}
                  {% endif %}
                badge_icon: >
                  {% if is_state('binary_sensor.backyard_flowers_needs_watering', 'on') %}mdi:water-alert
                  {% else %}mdi:check-circle{% endif %}
                badge_color: >
                  {% if is_state('binary_sensor.backyard_flowers_needs_watering', 'on') %}red{% else %}green{% endif %}
                tap_action:
                  action: call-service
                  service: script.stamp_plant_watered
                  service_data:
                    datetime_entity: input_datetime.backyard_flowers_last_watered
              - type: custom:mini-graph-card
                entities:
                  - entity: sensor.backyard_flowers_soil_soil_moisture
                    color: '#4caf50'
                hours_to_show: 48
                line_width: 2
                lower_bound: 0
                upper_bound: 100
                color_thresholds:
                  - value: 0
                    color: '#f44336'
                  - value: 20
                    color: '#ff9800'
                  - value: 40
                    color: '#4caf50'
                show:
                  fill: true
                  points: false
                  name: false
                  icon: false
                  extrema: true
              - type: custom:mushroom-entity-card
                entity: sensor.backyard_flowers_soil_battery
                name: Battery
                icon: mdi:battery
                fill_container: true
          - type: custom:stack-in-card
            cards:
              - type: custom:mushroom-template-card
                primary: Vegetable Garden
                secondary: >
                  {% set raw = states('sensor.vegetable_garden_soil_soil_moisture') %}
                  {% set traw = states('sensor.vegetable_garden_soil_temperature') %}
                  {% set t = traw | float | round(1) if traw not in ['unavailable', 'unknown'] else none %}
                  {% if raw in ['unavailable', 'unknown'] %}
                    Moisture unavailable{% if t is not none %} · {{ t }}°F{% endif %}
                  {% else %}
                    {% set m = raw | int %}
                    {% set ts = state_attr('input_datetime.vegetable_garden_last_watered', 'timestamp') %}
                    {% set temp_str = ' · ' ~ t ~ '°F' if t is not none else '' %}
                    {% if ts %}
                      {% set s = (now().timestamp() - ts) | int %}
                      {% set d = s // 86400 %}{% set h = (s % 86400) // 3600 %}
                      {{ m }}%{{ temp_str }} · watered {{ (d ~ 'd ' if d > 0 else '') ~ h ~ 'h' }} ago
                    {% else %}
                      {{ m }}% moisture{{ temp_str }}
                    {% endif %}
                  {% endif %}
                icon: mdi:sprout
                icon_color: >
                  {% set raw = states('sensor.vegetable_garden_soil_soil_moisture') %}
                  {% if raw in ['unavailable', 'unknown'] %}grey
                  {% else %}
                    {% set m = raw | float %}
                    {% if m < 20 %}red{% elif m < 40 %}orange{% else %}green{% endif %}
                  {% endif %}
                badge_icon: >
                  {% if is_state('binary_sensor.vegetable_garden_needs_watering', 'on') %}mdi:water-alert
                  {% else %}mdi:check-circle{% endif %}
                badge_color: >
                  {% if is_state('binary_sensor.vegetable_garden_needs_watering', 'on') %}red{% else %}green{% endif %}
                tap_action:
                  action: call-service
                  service: script.stamp_plant_watered
                  service_data:
                    datetime_entity: input_datetime.vegetable_garden_last_watered
              - type: custom:mini-graph-card
                entities:
                  - entity: sensor.vegetable_garden_soil_soil_moisture
                    color: '#8bc34a'
                hours_to_show: 48
                line_width: 2
                lower_bound: 0
                upper_bound: 100
                color_thresholds:
                  - value: 0
                    color: '#f44336'
                  - value: 20
                    color: '#ff9800'
                  - value: 40
                    color: '#4caf50'
                show:
                  fill: true
                  points: false
                  name: false
                  icon: false
                  extrema: true
              - type: custom:mushroom-entity-card
                entity: sensor.vegetable_garden_soil_battery
                name: Battery
                icon: mdi:battery
                fill_container: true

