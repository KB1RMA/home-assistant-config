# Water Alert Binary Sensors
# Single source of truth for all water alert conditions.
# Automations trigger on these — dashboard displays these.
# Thresholds are maintained here only.

- binary_sensor:

    # HA entity unavailable (ESPHome/MQTT connection lost)
    - name: "Water Meter Offline"
      unique_id: water_meter_offline
      device_class: problem
      state: >
        {{ states('sensor.water_meter_main_total') in ['unavailable', 'unknown'] }}

    # Sensor available but value frozen — physical sensor may have detached
    - name: "Water Meter Frozen"
      unique_id: water_meter_frozen
      device_class: problem
      state: >
        {% if states('sensor.water_meter_main_total') not in ['unavailable', 'unknown'] %}
          {{ (now() - states.sensor.water_meter_main_total.last_changed).total_seconds() > 28800 }}
        {% else %}
          false
        {% endif %}

    # >10 gallons in the overnight window — delegates to sensor.water_overnight_usage
    # which handles the 06:00 freeze and missing-snapshot fallback.
    - name: "Water Overnight Leak"
      unique_id: water_overnight_leak
      device_class: problem
      state: >
        {{ states('sensor.water_overnight_usage') | float(0) > 10 }}

    # Quarterly usage above 25 CCF (18,701 gal) but not yet in tier 2 — warning zone
    - name: "Water Approaching Tier 2"
      unique_id: water_approaching_tier2
      device_class: problem
      state: >
        {{ states('sensor.water_utility') | float(0) > 18701 and
           not (state_attr('sensor.water_quarter_cost', 'in_tier2') | bool(false)) }}

    # Quarterly usage has crossed 30 CCF tier 2 threshold
    - name: "Water In Tier 2"
      unique_id: water_in_tier2
      device_class: problem
      state: >
        {{ state_attr('sensor.water_quarter_cost', 'in_tier2') | bool(false) }}

    # Projected quarterly bill exceeds $250
    - name: "Water Bill High"
      unique_id: water_bill_high
      device_class: problem
      state: >
        {{ states('sensor.projected_quarterly_water_cost') | float(0) > 250 }}

    # Daily usage (since midnight) exceeds 150 gallons — delegates to sensor.water_daily_usage
    - name: "Water Daily Spike"
      unique_id: water_daily_spike
      device_class: problem
      state: >
        {{ states('sensor.water_daily_usage') | float(0) > 150 }}
