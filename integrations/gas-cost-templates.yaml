# Gas Cost Calculation Template Sensors
# These sensors automatically calculate gas costs using rates from National Grid multiscrape sensors
# Falls back to manual input_number helpers if website scraping fails
# Provides real-time cost tracking for Home Assistant Energy Dashboard

- sensor:
    # Cumulative gas cost sensor for energy dashboard
    - name: "Gas Total Cost"
      unique_id: gas_total_cost
      unit_of_measurement: "USD"
      device_class: monetary
      state_class: total_increasing
      state: >
        {% set current_total = states('sensor.gas_meter_consumption_15694770') | float(0) %}
        
        {# Get rates from multiscrape sensors with input_number fallbacks (all per therm) #}
        {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
        {% set supply_rate = states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) %}
        {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
        
        {# Convert ft³ → CCF → therms, then apply per-therm rates #}
        {% set total_therms = (current_total / 100) * therm_factor %}
        {% set total_usage_cost = total_therms * (delivery_rate + supply_rate) %}
        
        {{ total_usage_cost | round(2) }}
      attributes:
        total_consumption_ft3: >
          {{ states('sensor.gas_meter_consumption_15694770') | float(0) }}
        total_consumption_ccf: >
          {{ (states('sensor.gas_meter_consumption_15694770') | float(0) / 100) | round(2) }}
        total_consumption_therms: >
          {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
          {{ ((states('sensor.gas_meter_consumption_15694770') | float(0) / 100) * therm_factor) | round(2) }}
        therm_factor: >
          {{ states('input_number.gas_therm_factor') | float(1.03378) }}
        delivery_rate_per_therm: >
          {{ states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) }}
        supply_rate_per_therm: >
          {{ states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) }}
        combined_rate_per_therm: >
          {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
          {% set supply_rate = states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) %}
          {{ (delivery_rate + supply_rate) | round(4) }}
        note: >
          {{ "Tracks cumulative variable usage cost (excludes minimum charge, paperless credit, and MA Winter Bill Relief). See Estimated Monthly Gas Cost for full bill estimate." }}

    # Calculate estimated monthly gas cost using input_number rates
    - name: "Estimated Monthly Gas Cost"
      unique_id: estimated_monthly_gas_cost
      unit_of_measurement: "USD"
      device_class: monetary
      state_class: measurement
      state: >
        {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
        {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
        {% set last_month_consumption = last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max %}
        
        {# Get rates from multiscrape sensors with input_number fallbacks (all per therm) #}
        {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
        {% set supply_rate = states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) %}
        {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
        {% set minimum_charge = states('input_number.gas_customer_charge') | float(11.60) %}
        {% set paperless_credit = states('input_number.gas_paperless_credit') | float(0.38) %}
        
        {# Convert ft³ → CCF → therms #}
        {% set monthly_therms = (last_month_consumption / 100) * therm_factor %}
        
        {% set variable_cost = monthly_therms * (delivery_rate + supply_rate) %}
        {% set total_before_relief = variable_cost + minimum_charge %}
        
        {# MA Winter Bill Relief: 10% reduction applies to bills covering Feb or Mar usage #}
        {% set last_month = (now().month - 2) % 12 + 1 %}
        {% if last_month == 2 or last_month == 3 %}
          {% set total_with_relief = total_before_relief * 0.9 %}
        {% else %}
          {% set total_with_relief = total_before_relief %}
        {% endif %}
        
        {{ (total_with_relief - paperless_credit) | round(2) }}
      attributes:
        last_month_consumption_ft3: >
          {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
          {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
          {{ last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max }}
        last_month_consumption_ccf: >
          {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
          {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
          {% set ft3 = last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max %}
          {{ (ft3 / 100) | round(2) }}
        last_month_consumption_therms: >
          {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
          {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
          {% set ft3 = last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max %}
          {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
          {{ ((ft3 / 100) * therm_factor) | round(2) }}
        therm_factor: >
          {{ states('input_number.gas_therm_factor') | float(1.03378) }}
        estimated_variable_cost: >
          {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
          {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
          {% set last_month = last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max %}
          {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
          {% set monthly_therms = (last_month / 100) * therm_factor %}
          {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
          {% set supply_rate = states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) %}
          {{ (monthly_therms * (delivery_rate + supply_rate)) | round(2) }}
        estimated_delivery_cost: >
          {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
          {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
          {% set last_month = last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max %}
          {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
          {% set monthly_therms = (last_month / 100) * therm_factor %}
          {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
          {{ (monthly_therms * delivery_rate) | round(2) }}
        estimated_supply_cost: >
          {% set last_period = state_attr('sensor.gas_utility', 'last_period') | float(0) %}
          {% set apr1_read = states('sensor.gas_meter_consumption_15694770') | float(0) - states('sensor.gas_utility') | float(0) %}
          {% set last_month = last_period if last_period > 0 else [apr1_read - states('input_number.gas_meter_start_reading') | float(0), 0] | max %}
          {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
          {% set monthly_therms = (last_month / 100) * therm_factor %}
          {% set supply_rate = states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) %}
          {{ (monthly_therms * supply_rate) | round(2) }}
        minimum_charge: >
          {{ states('input_number.gas_customer_charge') | float(11.60) }}
        paperless_credit: >
          {{ states('input_number.gas_paperless_credit') | float(0.38) }}
        ma_winter_bill_relief_applied: >
          {% set last_month = (now().month - 2) % 12 + 1 %}
          {{ last_month == 2 or last_month == 3 }}
        delivery_rate_per_therm: >
          {{ states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) }}
        supply_rate_per_therm: >
          {{ states('sensor.nationalgrid_gas_supply_rate') | float(states('input_number.gas_supply_rate') | float(1.2329)) }}
        rate_source: >
          {% if states('sensor.nationalgrid_gas_delivery_rate') != 'unknown' and states('sensor.nationalgrid_gas_delivery_rate') != 'unavailable' %}
            {{ "Automated extraction from National Grid website (every 2 weeks)" }}
          {% else %}
            {{ "Manual input via Home Assistant input_number helpers" }}
          {% endif %}
        rates_update_instructions: >
          {{ "Rates automatically updated every 2 weeks from National Grid. Fallback: Update in Configuration > Helpers if needed" }}
        delivery_rate_schedule: >
          {{ "R-3B - Residential Heating (updates quarterly)" }}
        supply_rate_schedule: >
          {{ "Default Service (updates monthly)" }}
        rates_last_updated: >
          {% if states('sensor.nationalgrid_gas_delivery_rate') != 'unknown' and states('sensor.nationalgrid_gas_delivery_rate') != 'unavailable' %}
            {{ state_attr('sensor.nationalgrid_gas_delivery_rate', 'last_updated') | as_timestamp | timestamp_custom('%Y-%m-%d %H:%M:%S') if state_attr('sensor.nationalgrid_gas_delivery_rate', 'last_updated') else "Unknown" }}
          {% else %}
            {{ "Update manually from gas bill" }}
          {% endif %}

    # Current month variable cost so far (consumption-based, no fixed charges)
    - name: "Current Month Gas Cost"
      unique_id: current_month_gas_cost
      unit_of_measurement: "USD"
      device_class: monetary
      state_class: measurement
      state: >
        {% set current_month_ft3 = states('sensor.current_month_gas_consumption_trend') | float(0) %}
        {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
        {% set supply_rate = states('input_number.gas_supply_rate') | float(1.2329) %}
        {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
        {% set therms = (current_month_ft3 / 100) * therm_factor %}
        {{ (therms * (delivery_rate + supply_rate)) | round(2) }}

    # Projected full-month bill (usage extrapolated + all fixed charges)
    - name: "Projected Monthly Gas Cost"
      unique_id: projected_monthly_gas_cost
      unit_of_measurement: "USD"
      device_class: monetary
      state_class: measurement
      state: >
        {% set current_ft3 = states('sensor.current_month_gas_consumption_trend') | float(0) %}
        {% set days_elapsed = now().day %}
        {% set month = now().month %}
        {% set year = now().year %}
        {% if month == 12 %}
          {% set next_month = now().replace(year=year+1, month=1, day=1) %}
        {% else %}
          {% set next_month = now().replace(month=month+1, day=1) %}
        {% endif %}
        {% set days_in_month = (next_month - now().replace(day=1)).days %}
        {% set projected_ft3 = (current_ft3 * days_in_month / days_elapsed) if days_elapsed > 0 else 0 %}
        {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
        {% set supply_rate = states('input_number.gas_supply_rate') | float(1.2329) %}
        {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
        {% set minimum_charge = states('input_number.gas_customer_charge') | float(11.60) %}
        {% set paperless_credit = states('input_number.gas_paperless_credit') | float(0.38) %}
        {% set therms = (projected_ft3 / 100) * therm_factor %}
        {% set variable = therms * (delivery_rate + supply_rate) %}
        {% set total = variable + minimum_charge %}
        {% if month == 2 or month == 3 %}
          {% set total = total * 0.9 %}
        {% endif %}
        {{ (total - paperless_credit) | round(2) }}
      attributes:
        days_elapsed: "{{ now().day }}"
        projected_consumption_ft3: >
          {% set current_ft3 = states('sensor.current_month_gas_consumption_trend') | float(0) %}
          {% set days_elapsed = now().day %}
          {% set month = now().month %}
          {% set year = now().year %}
          {% if month == 12 %}
            {% set next_month = now().replace(year=year+1, month=1, day=1) %}
          {% else %}
            {% set next_month = now().replace(month=month+1, day=1) %}
          {% endif %}
          {% set days_in_month = (next_month - now().replace(day=1)).days %}
          {{ ((current_ft3 * days_in_month / days_elapsed) if days_elapsed > 0 else 0) | round(0) }}
        winter_relief_applied: >
          {% set month = now().month %}
          {{ month == 2 or month == 3 }}

    # Calculate current month consumption trend
    # sensor.gas_utility state IS the current month usage — it resets at month boundaries
    - name: "Current Month Gas Consumption Trend"
      unique_id: current_month_gas_trend
      unit_of_measurement: "ft³"
      state_class: measurement
      state: >
        {{ states('sensor.gas_utility') | float(0) | round(1) }}
      attributes:
        days_in_month: >
          {{ now().day }}
        projected_monthly_consumption: >
          {% set current_consumption = states('sensor.gas_utility') | float(0) %}
          {% set days_elapsed = now().day %}
          {% set month = now().month %}
          {% set year = now().year %}
          {% if month == 12 %}
            {% set next_month = now().replace(year=year+1, month=1, day=1) %}
          {% else %}
            {% set next_month = now().replace(month=month+1, day=1) %}
          {% endif %}
          {% set days_in_month = (next_month - now().replace(day=1)).days %}
          {{ ((current_consumption * days_in_month / days_elapsed) | round(0)) if days_elapsed > 0 else 0 }}
        projected_monthly_consumption_weather_adjusted: >
          {% set current_consumption = states('sensor.gas_utility') | float(0) %}
          {% set days_elapsed = now().day %}
          {% set month = now().month %}
          {% set year = now().year %}
          {% if month == 12 %}
            {% set next_month = now().replace(year=year+1, month=1, day=1) %}
          {% else %}
            {% set next_month = now().replace(month=month+1, day=1) %}
          {% endif %}
          {% set days_in_month = (next_month - now().replace(day=1)).days %}
          {% set days_remaining = days_in_month - days_elapsed %}
          {% if days_elapsed == 0 or current_consumption == 0 %}
            {{ 0 }}
          {% else %}
            {% set outdoor_temp = states('sensor.olive_st_wx_temp') | float(55) %}
            {% set heating_base_temp = 65 %}
            {# Non-heating base load per day: domestic hot water + cooking ~50 ft³ #}
            {% set base_daily = 50 %}
            {% set avg_daily = current_consumption / days_elapsed %}
            {% set heating_daily_avg = [avg_daily - base_daily, 0] | max %}
            {# Climatological average daily HDD (base 65°F) for Newburyport MA by month #}
            {# Index 0 = unused, 1=Jan ... 12=Dec #}
            {% set monthly_hdd = [0, 35, 30, 22, 12, 4, 0, 0, 0, 1, 10, 22, 32] %}
            {% set avg_month_hdd = monthly_hdd[month] | float(15) %}
            {% set current_hdd = [heating_base_temp - outdoor_temp, 0] | max %}
            {# Scale remaining heating load: how cold is it NOW vs the monthly average #}
            {% set hdd_factor = (current_hdd / avg_month_hdd) if avg_month_hdd > 0 else 0 %}
            {% set remaining_daily = base_daily + heating_daily_avg * hdd_factor %}
            {{ (current_consumption + remaining_daily * days_remaining) | round(0) | int }}
          {% endif %}
        outdoor_temp_f: >
          {{ states('sensor.olive_st_wx_temp') | float('unknown') }}
        days_remaining: >
          {% set month = now().month %}
          {% set year = now().year %}
          {% if month == 12 %}
            {% set next_month = now().replace(year=year+1, month=1, day=1) %}
          {% else %}
            {% set next_month = now().replace(month=month+1, day=1) %}
          {% endif %}
          {% set days_in_month = (next_month - now().replace(day=1)).days %}
          {{ days_in_month - now().day }}

    # Combined delivery + supply rate for history tracking
    - name: "Gas Combined Rate"
      unique_id: gas_combined_rate
      unit_of_measurement: "USD/therm"
      device_class: monetary
      state_class: measurement
      state: >
        {% set delivery = states('sensor.nationalgrid_gas_delivery_rate') | float(0) %}
        {% set supply = states('input_number.gas_supply_rate') | float(0) %}
        {{ (delivery + supply) | round(4) if delivery > 0 and supply > 0 else none }}

    # Gas cost rate per ft³ — use this as the "entity tracking the price" in the Energy
    # dashboard gas source configuration to get accurate per-period cost calculations.
    # Formula: (delivery + supply) $/therm × therm_factor therms/CCF ÷ 100 ft³/CCF
    - name: "Gas Rate Per ft³"
      unique_id: gas_rate_per_ft3
      unit_of_measurement: "USD/ft³"
      device_class: monetary
      state_class: measurement
      state: >
        {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(states('input_number.gas_delivery_rate') | float(1.5118)) %}
        {% set supply_rate = states('input_number.gas_supply_rate') | float(1.2329) %}
        {% set therm_factor = states('input_number.gas_therm_factor') | float(1.03378) %}
        {{ ((delivery_rate + supply_rate) * therm_factor / 100) | round(6) }}

    # Monitor for rate changes from multiscrape sensors
    - name: "Gas Rate Change Monitor"
      unique_id: gas_rate_change_monitor
      state: >
        {% set delivery_rate = states('sensor.nationalgrid_gas_delivery_rate') | float(0) %}
        {% set supply_rate = states('input_number.gas_supply_rate') | float(0) %}
        {% if delivery_rate > 0 and supply_rate > 0 %}
          {{ "Rates Active - Delivery: $" ~ delivery_rate ~ "/therm, Supply: $" ~ supply_rate ~ "/therm" }}
        {% else %}
          {{ "No rates available - Check sensors" }}
        {% endif %}
      attributes:
        delivery_rate: >
          {{ states('sensor.nationalgrid_gas_delivery_rate') | float(0) }}
        supply_rate: >
          {{ states('input_number.gas_supply_rate') | float(0) }}
        minimum_charge: >
          {{ states('input_number.gas_customer_charge') | float(11.60) }}
        rate_schedule: >
          {{ "R-3B - Residential Heating" }}
        rate_source: >
          {% set delivery_source = state_attr('sensor.nationalgrid_gas_delivery_rate', 'rate_source') | default('Unknown') %}
          {{ "Delivery: " ~ delivery_source ~ " | Supply: input_number.gas_supply_rate" }}
        last_scraped: >
          {{ state_attr('sensor.nationalgrid_gas_delivery_rate', 'last_scraped') | default('Never') }}
        tariff_info: >
          {{ states('sensor.nationalgrid_gas_tariff_updated') | default('Check manually') }}
        automation_status: >
          {% set delivery_source = state_attr('sensor.nationalgrid_gas_delivery_rate', 'rate_source') | default('') %}
          {% if 'Extracted from National Grid website' in delivery_source %}
            {{ "Delivery automated - Supply: update input_number.gas_supply_rate from bill" }}
          {% else %}
            {{ "Delivery using fallback - update input_number.gas_delivery_rate from bill" }}
          {% endif %}