# Utility Meter Configurations
# Tracks usage cycles and resets for various meters

gas_utility:
  source: sensor.gas_meter_consumption_15694770
  cycle: monthly

water_utility:
  source: sensor.water_meter_main_total
  cron: "0 0 18 2,5,8,11 *"  # Reset ~Feb 18 / May 18 / Aug 18 / Nov 18 (Newburyport billing cycle)

electric_utility:
  source: sensor.electric_meter_consumption
  cycle: monthly 